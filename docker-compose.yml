services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doclens
      POSTGRES_USER: doclens
      POSTGRES_PASSWORD: doclens
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doclens -d doclens"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: ./ai-service
    environment:
      DATABASE_URL: postgresql+asyncpg://doclens:doclens@postgres:5432/doclens
      NESTJS_CALLBACK_URL: http://backend:3001/api/v1/internal/ai-callback
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-change-this-in-production}
      MODEL_NAME: all-MiniLM-L6-v2
      FAISS_INDEX_PATH: /app/data/faiss.index
      UPLOAD_DIR: /shared/backend
      CORS_ORIGINS: http://backend:3001
      ENFORCE_INTERNAL_AUTH: "true"
    volumes:
      - ai-data:/app/data
      - backend-uploads:/shared/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 20s
      timeout: 10s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://doclens:doclens@postgres:5432/doclens
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-change-this-in-production}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      ADMIN_EMAIL: admin@doclens.ai
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@1234}
    ports:
      - "3001:3001"
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 20

  backend-migrate:
    build:
      context: ./backend
      target: build
    environment:
      DATABASE_URL: postgresql://doclens:doclens@postgres:5432/doclens
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  ai-data:
  backend-uploads:
